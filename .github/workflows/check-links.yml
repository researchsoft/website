name: Check Links

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    # Run weekly on Monday at 9am UTC to catch links that go dead over time
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  link-check:
    name: Check Links with htmltest
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Build site
        run: hugo --gc --minify --buildFuture

      - name: Install htmltest
        run: |
          curl -fsSL https://github.com/wjdp/htmltest/releases/download/v0.17.0/htmltest_0.17.0_linux_amd64.tar.gz | tar -xz
          chmod +x htmltest
          sudo mv htmltest /usr/local/bin/

      - name: Check links
        run: |
          # Run htmltest and filter output to show only errors (exclude success messages)
          if htmltest > htmltest-output.txt 2>&1; then
            echo "✅ All links validated successfully!"
          else
            echo "❌ Link validation failed"
            echo ""
            # Show everything EXCEPT success/progress messages
            grep -v -E "(hitting ---|^  OK ---|^  Partial Content ---|^  from cache ---|^  fresh ---|^  DOCTYPE|^testDocument|^[[:space:]]*$)" htmltest-output.txt || cat htmltest-output.txt
            exit 1
          fi

      - name: Archive htmltest results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: htmltest-report
          path: tmp/.htmltest/
          retention-days: 7
