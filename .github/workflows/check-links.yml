name: Check Links

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  schedule:
    # Run weekly on Monday at 9am UTC to catch links that go dead over time
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  link-check:
    name: Check Links with htmltest
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Build site
        run: hugo --gc --minify --buildFuture

      - name: Install htmltest
        run: |
          curl -fsSL https://github.com/wjdp/htmltest/releases/download/v0.17.0/htmltest_0.17.0_linux_amd64.tar.gz | tar -xz
          chmod +x htmltest
          sudo mv htmltest /usr/local/bin/

      - name: Check links
        run: |
          # Run htmltest and filter output to show only actual errors
          if htmltest > htmltest-output.txt 2>&1; then
            echo "✅ All links validated successfully!"
          else
            echo "❌ Link validation failed"
            echo ""
            # Filter out non-error status messages, show only actual problems
            grep -E "(✘|ERROR|FAILED|Status: [4-9][0-9]{2}|not found|does not exist|timeout)" htmltest-output.txt || \
            grep -v -E "(hitting ---|OK ---|Partial Content ---|from cache ---|fresh ---|DOCTYPE|testDocument)" htmltest-output.txt | \
            grep -v "^$" || \
            echo "No specific errors found in output, showing summary:"
            tail -20 htmltest-output.txt
            exit 1
          fi

      - name: Archive htmltest results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: htmltest-report
          path: tmp/.htmltest/
          retention-days: 7
